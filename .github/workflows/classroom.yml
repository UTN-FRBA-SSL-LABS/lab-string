name: Autograding

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograding:
    name: Autograding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar GCC y Make
        run: sudo apt-get install -y gcc make

      # ── Compilación ────────────────────────────────────────────────────────

      - name: "C1. String.o compila"
        if: always()
        run: gcc -Wall -Wextra -std=c99 -c String.c -o String.o

      - name: "C2. StringTest compila"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 StringTest.c String.o -o StringTest

      - name: "C3. Conversion.o compila"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 -c Conversion.c -o Conversion.o

      - name: "C4. ConversionTest compila"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 -c Conversion.c -o Conversion.o
          gcc -Wall -Wextra -std=c99 ConversionTest.c Conversion.o String.o -o ConversionTest

      - name: "C5. Todos los programas compilan"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 -c Conversion.c -o Conversion.o
          gcc -Wall -Wextra -std=c99 enlineas.c -o enlineas
          gcc -Wall -Wextra -std=c99 longitudes.c String.o -o longitudes
          gcc -Wall -Wextra -std=c99 mayorlongitud.c String.o -o mayorlongitud
          gcc -Wall -Wextra -std=c99 todosiguales.c String.o -o todosiguales
          gcc -Wall -Wextra -std=c99 suma.c Conversion.o String.o -o suma

      # ── Tests ──────────────────────────────────────────────────────────────

      - name: "T1. StringTest pasa"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 StringTest.c String.o -o StringTest
          ./StringTest

      - name: "T2. ConversionTest pasa"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 -c Conversion.c -o Conversion.o
          gcc -Wall -Wextra -std=c99 ConversionTest.c Conversion.o String.o -o ConversionTest
          ./ConversionTest

      # ── Programas ──────────────────────────────────────────────────────────

      - name: "P1. enlineas: salida correcta"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 enlineas.c -o enlineas
          ./enlineas hola mundo | grep -x "hola"
          ./enlineas hola mundo | grep -x "mundo"

      - name: "P2. longitudes: salida correcta"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 longitudes.c String.o -o longitudes
          ./longitudes hola | grep -x "4"

      - name: "P3. mayorlongitud: salida correcta"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 mayorlongitud.c String.o -o mayorlongitud
          ./mayorlongitud corto largo | grep -x "largo"

      - name: "P4. todosiguales: salida correcta"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 todosiguales.c String.o -o todosiguales
          ./todosiguales igual igual | grep -x "1"
          ./todosiguales uno dos | grep -x "0"

      - name: "P5. suma: salida correcta"
        if: always()
        run: |
          gcc -Wall -Wextra -std=c99 -c String.c -o String.o
          gcc -Wall -Wextra -std=c99 -c Conversion.c -o Conversion.o
          gcc -Wall -Wextra -std=c99 suma.c Conversion.o String.o -o suma
          ./suma 1 2 3 | grep -x "6"

      # ── Archivos con contenido ─────────────────────────────────────────────

      - name: "F1. AnalisisComparativo.md completado"
        if: always()
        run: |
          test -s AnalisisComparativo.md
          ! grep -q "(respuesta)" AnalisisComparativo.md

      - name: "F2. String.md completado"
        if: always()
        run: |
          test -s String.md
          ! grep -q "completar" String.md

      # ── Reporte final ──────────────────────────────────────────────────────
      - name: Resultado autograding
        if: always()
        uses: education/autograding@v1
